[package]
name = "kei-replay"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "Reconstruct agent spawn from DNA — reads ledger row + task.toml, re-composes, detects drift"
authors = ["Denis Parfionovich <info@greendragon.info>"]

[[bin]]
name = "kei-replay"
path = "src/main.rs"

[lib]
name = "kei_replay"
path = "src/lib.rs"

[dependencies]
kei-agent-runtime = { path = "../kei-agent-runtime" }
rusqlite = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
sha2 = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
toml = { workspace = true }

[package.metadata.keisei]
backend = "none"
description = "Reconstruct agent spawn from DNA — replay / verify / diff"
authors = ["Denis Parfionovich <info@greendragon.info>"]
