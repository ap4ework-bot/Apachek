[package]
name = "kei-tlog"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "RULE 0.17 — atomar time-logger for agents and pipelines. Emits JSONL lines to ~/.claude/memory/time-metrics/tasks.jsonl."
authors.workspace = true
license.workspace = true

[[bin]]
name = "kei-tlog"
path = "src/main.rs"

[dependencies]
serde_json = { workspace = true }

[package.metadata.keisei]
trait = "TimeLogger"
description = "Wall-clock + JSONL journal for any pipeline. Constructor Pattern: 1 binary, 1 responsibility."
authors = ["Denis Parfionovich <info@greendragon.info>"]
